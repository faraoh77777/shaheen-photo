<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>SHAHEEN Photo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0F1E;font-family:Arial,sans-serif;color:#F1F5F9;min-height:100vh;
  padding:16px;padding-bottom:100px;}
.app-title{font-size:15px;font-weight:800;color:#F59E0B;margin-bottom:2px;}
.app-sub{font-size:11px;color:#475569;margin-bottom:14px;}
.card{background:#0F172A;border:1px solid #1E293B;border-radius:14px;padding:14px;margin-bottom:12px;}
.flbl{font-size:10px;font-weight:700;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;margin-top:10px;}
.f{width:100%;background:#060D1A;border:1px solid #1E293B;border-radius:8px;padding:10px 12px;color:#F1F5F9;font-size:13px;outline:none;font-family:Arial;}
select.f option{background:#0F172A;}
textarea.f{resize:none;height:60px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cat-bar{height:3px;border-radius:2px;margin-top:6px;transition:background 0.2s;}
.cam-box{width:100%;aspect-ratio:4/3;background:#060D1A;border:2px dashed #1E293B;
  border-radius:12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;position:relative;overflow:hidden;margin-bottom:10px;}
.corner{position:absolute;width:20px;height:20px;}
.tl{top:10px;left:10px;border-top:2px solid #F59E0B;border-left:2px solid #F59E0B;border-radius:2px 0 0 0;}
.tr{top:10px;right:10px;border-top:2px solid #F59E0B;border-right:2px solid #F59E0B;border-radius:0 2px 0 0;}
.bl{bottom:10px;left:10px;border-bottom:2px solid #F59E0B;border-left:2px solid #F59E0B;border-radius:0 0 0 2px;}
.br{bottom:10px;right:10px;border-bottom:2px solid #F59E0B;border-right:2px solid #F59E0B;border-radius:0 0 2px 0;}
canvas{width:100%;border-radius:10px;display:block;}
.sbtn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px;}
.sbtn-cam{background:linear-gradient(135deg,#F59E0B,#D97706);color:#000;}
.sbtn-save{background:linear-gradient(135deg,#10B981,#059669);color:#fff;}
.sbtn-save:disabled{background:#1E293B;color:#475569;cursor:not-allowed;}
.hdivider{height:1px;background:#1E293B;margin:8px 0;}

/* 저장된 사진 목록 */
.saved-list{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.saved-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;
  border:2px solid #1E293B;}
.saved-item img{width:100%;height:100%;object-fit:cover;}
.saved-item .del-btn{position:absolute;top:2px;right:2px;background:rgba(239,68,68,0.9);
  border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;}
.saved-item .num{position:absolute;bottom:2px;left:4px;font-size:9px;color:#fff;
  font-weight:800;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
.empty-list{text-align:center;padding:20px;color:#334155;font-size:12px;}

/* 하단 고정 버튼 */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;
  padding:10px 16px 20px;background:linear-gradient(transparent,#0A0F1E 35%);}
.bottom-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-share{padding:13px;border:none;border-radius:12px;font-size:13px;font-weight:800;
  cursor:pointer;background:#FEE500;color:#000;display:flex;align-items:center;
  justify-content:center;gap:6px;}
.btn-share:disabled{background:#1E293B;color:#475569;cursor:not-allowed;}
.btn-addmore{padding:13px;border:none;border-radius:12px;font-size:13px;font-weight:800;
  cursor:pointer;background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;
  display:flex;align-items:center;justify-content:center;gap:6px;}

#toast,#toastE{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;
  display:none;z-index:9998;white-space:nowrap;color:#fff;}
#toast{background:#10B981;}
#toastE{background:#EF4444;}
</style>
</head>
<body>

<div class="app-title">&#128247; SHAHEEN Photo</div>
<div class="app-sub">Field Photo Registration</div>

<!-- Info Card -->
<div class="card">
  <div class="flbl">Date / Time</div>
  <div class="row2">
    <input type="date" id="inDate" class="f"/>
    <input type="time" id="inTime" class="f"/>
  </div>
  <div class="flbl">TAG No.</div>
  <input type="text" id="inTag" class="f" placeholder="e.g. PT-2101, FT-2305"/>
  <div class="flbl">Work Type</div>
  <select id="inCat" class="f">
    <option value="dcs">DCS Panel</option>
    <option value="lcp">LCP</option>
    <option value="jb">Junction Box</option>
    <option value="fi" selected>Field Instrument</option>
    <option value="duct">Cable Duct</option>
    <option value="tray">Cable Tray</option>
    <option value="conduit">Conduit Pipe</option>
    <option value="airpipe">Air Pipe</option>
    <option value="hookup">Hook Up</option>
    <option value="stanchion">Stanchion</option>
    <option value="support">Support</option>
    <option value="conn">Connection</option>
    <option value="linecheck">Line Check</option>
    <option value="looptest">Loop Test</option>
    <option value="calib">Instrument Calibration</option>
    <option value="steamtube">Steam Tracing Tube</option>
    <option value="steamins">Steam Tracing Insulation</option>
    <option value="scaffold">Scaffolding</option>
    <option value="etc">Others</option>
  </select>
  <div class="cat-bar" id="catBar"></div>
  <div class="flbl">Area</div>
  <select id="inLoc" class="f">
    <option>Unit-2120 / Area-A</option>
    <option>Unit-2120 / Area-B</option>
    <option>Unit-2120 / Area-C</option>
    <option>Unit-2120 / Cable Tray</option>
    <option>Unit-2120 / Control Room</option>
    <option>Unit-2130 / Area-A</option>
    <option>Unit-2130 / Area-B</option>
    <option>Unit-2130 / Main Gate</option>
    <option>Unit-2130 / Control Room</option>
    <option>CCR / Remote Rack Room</option>
    <option>U&amp;O / Main Building</option>
    <option>SHAHEEN Site (Others)</option>
  </select>
  <div class="flbl">Team Leader</div>
  <input type="text" id="inLeader" class="f" placeholder="Team leader name"/>
  <div class="flbl">Remarks</div>
  <textarea id="inNote" class="f" placeholder="Special notes..."></textarea>
</div>

<!-- Camera Card -->
<div class="card" id="camCard">
  <div class="flbl">Photo (4:3)</div>
  <div class="cam-box" id="camBox">
    <div style="text-align:center;pointer-events:none;">
      <div style="font-size:46px;margin-bottom:8px;">&#128247;</div>
      <p style="font-size:13px;color:#64748B;">Tap to take photo (4:3)</p>
    </div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none"/>
  <button class="sbtn sbtn-cam" id="camBtn">&#128247; Camera / Gallery</button>
</div>

<!-- Preview Card -->
<div class="card" id="prevCard" style="display:none;">
  <div class="flbl">Preview</div>
  <canvas id="canvas"></canvas>
  <div class="hdivider"></div>
  <button class="sbtn sbtn-save" id="saveBtn">&#128190; 저장 후 목록에 추가</button>
</div>

<!-- 저장된 사진 목록 Card -->
<div class="card" id="listCard">
  <div class="flbl" style="display:flex;justify-content:space-between;align-items:center;">
    <span>저장된 사진 <span id="photoCount" style="color:#F59E0B;">0</span>장</span>
    <button onclick="clearAll()" style="background:none;border:1px solid #334155;border-radius:6px;
      color:#64748B;font-size:10px;padding:3px 8px;cursor:pointer;">전체 삭제</button>
  </div>
  <div class="saved-list" id="savedList">
    <div class="empty-list" id="emptyMsg" style="grid-column:span 3;">
      촬영된 사진이 없습니다
    </div>
  </div>
</div>

<!-- 하단 고정 버튼 -->
<div class="bottom-bar">
  <div class="bottom-btns">
    <button class="btn-addmore" id="addMoreBtn">
      &#128247; 추가 촬영
    </button>
    <button class="btn-share" id="shareBtn" disabled>
      &#128172; 카카오톡 전송 (<span id="shareCnt">0</span>장)
    </button>
  </div>
</div>

<div id="toast"></div>
<div id="toastE"></div>

<script>
var CC = {
  dcs:"#F59E0B",lcp:"#F97316",jb:"#EAB308",fi:"#3B82F6",duct:"#06B6D4",
  tray:"#8B5CF6",conduit:"#EC4899",airpipe:"#10B981",hookup:"#14B8A6",
  stanchion:"#6366F1",support:"#A855F7",conn:"#F43F5E",linecheck:"#22C55E",
  looptest:"#0EA5E9",calib:"#D97706",steamtube:"#EF4444",steamins:"#DC2626",
  scaffold:"#64748B",etc:"#6B7280"
};

var loadedImg  = null;
var savedPhotos = []; // {dataUrl, filename, blob}

/* ── 초기값 ── */
var now = new Date();
document.getElementById("inDate").value = now.toISOString().slice(0,10);
document.getElementById("inTime").value = now.toTimeString().slice(0,5);
updCat();

/* ── 이벤트 ── */
document.getElementById("camBox").addEventListener("click", openCamera);
document.getElementById("camBtn").addEventListener("click", openCamera);
document.getElementById("addMoreBtn").addEventListener("click", openCamera);
document.getElementById("fileInput").addEventListener("change", loadImg);
document.getElementById("saveBtn").addEventListener("click", savePhoto);
document.getElementById("shareBtn").addEventListener("click", sharePhotos);
document.getElementById("inCat").addEventListener("change", updCat);
["inDate","inTime","inTag","inCat","inLoc","inLeader","inNote"].forEach(function(id){
  ["input","change"].forEach(function(ev){
    document.getElementById(id).addEventListener(ev, function(){
      if(loadedImg) renderCanvas();
      if(id==="inCat") updCat();
    });
  });
});

function openCamera(){
  document.getElementById("fileInput").click();
}

function updCat(){
  var v = document.getElementById("inCat").value;
  document.getElementById("catBar").style.background = CC[v]||"#6B7280";
}

/* ── 4:3 Crop ── */
function crop43(img){
  var sW=img.width,sH=img.height,r=4/3;
  var cW,cH,ox=0,oy=0;
  if(sW/sH>r){cH=sH;cW=Math.round(sH*r);ox=Math.round((sW-cW)/2);}
  else{cW=sW;cH=Math.round(sW/r);oy=Math.round((sH-cH)/2);}
  var c=document.createElement("canvas");
  c.width=cW;c.height=cH;c._w=cW;c._h=cH;
  c.getContext("2d").drawImage(img,ox,oy,cW,cH,0,0,cW,cH);
  return c;
}

/* ── Load Image ── */
function loadImg(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      loadedImg=crop43(img);
      document.getElementById("camBox").innerHTML=
        '<img src="'+loadedImg.toDataURL()+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px;"/>'
        +'<div class="corner tl"></div><div class="corner tr"></div>'
        +'<div class="corner bl"></div><div class="corner br"></div>';
      renderCanvas();
      document.getElementById("prevCard").style.display="block";
      document.getElementById("prevCard").scrollIntoView({behavior:"smooth"});
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value="";
}

/* ── Render Canvas ── */
function renderCanvas(){
  if(!loadedImg)return;
  var cv=document.getElementById("canvas");
  var W=loadedImg._w,H=loadedImg._h;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext("2d");
  ctx.drawImage(loadedImg,0,0);

  var date  =document.getElementById("inDate").value;
  var time  =document.getElementById("inTime").value;
  var tag   =document.getElementById("inTag").value.trim();
  var catEl =document.getElementById("inCat");
  var cat   =catEl.options[catEl.selectedIndex].text;
  var loc   =document.getElementById("inLoc").value;
  var leader=document.getElementById("inLeader").value.trim();

  var fs  =Math.max(28,Math.round(W*0.042));
  var lh  =Math.round(fs*1.5);
  var padX=Math.round(W*0.06);
  var padY=Math.round(fs*0.3);

  ctx.textBaseline="top";

  /* 상단: Work Type */
  ctx.font="bold "+fs+"px Arial,sans-serif";
  ctx.fillStyle="#FFD600";
  ctx.fillText(cat,padX,padY);

  /* 하단 2행 2열 */
  var botRows=[
    [date+"  "+time, tag||"-"],
    [loc,            leader||"-"]
  ];
  var botBoxH=botRows.length*lh;
  var botBoxY=H-botBoxH-padY;
  var colW=(W-padX*2)/2;

  botRows.forEach(function(cols,row){
    var y=botBoxY+row*lh;
    cols.forEach(function(txt,col){
      ctx.fillStyle=(row===0&&col===0)?"#FFD600":"#FFFFFF";
      var x=padX+col*colW;
      var dfs=fs;
      ctx.font="bold "+dfs+"px Arial,sans-serif";
      while(ctx.measureText(txt).width>colW-8&&dfs>14){
        dfs--;ctx.font="bold "+dfs+"px Arial,sans-serif";
      }
      ctx.fillText(txt,x,y);
    });
  });
}

/* ── Save to List ── */
function savePhoto(){
  if(!loadedImg)return;
  var btn=document.getElementById("saveBtn");
  btn.disabled=true;btn.textContent="저장 중...";

  var cv   =document.getElementById("canvas");
  var date =document.getElementById("inDate").value.replace(/-/g,"");
  var time =document.getElementById("inTime").value.replace(":","");
  var tag  =(document.getElementById("inTag").value.trim().replace(/\s/g,"_"))||"photo";
  var fname="SHAHEEN_"+date+"_"+time+"_"+tag+"_"+(savedPhotos.length+1)+".jpg";
  var dataUrl=cv.toDataURL("image/jpeg",0.92);

  /* Blob 변환 */
  var byteStr=atob(dataUrl.split(",")[1]);
  var ab=new ArrayBuffer(byteStr.length);
  var ia=new Uint8Array(ab);
  for(var i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
  var blob=new Blob([ab],{type:"image/jpeg"});

  savedPhotos.push({dataUrl:dataUrl,filename:fname,blob:blob});
  updateList();

  /* 휴대폰 저장 (다운로드) */
  var a=document.createElement("a");
  a.href=dataUrl;
  a.download=fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  showT("저장 완료! 총 "+savedPhotos.length+"장");

  btn.disabled=false;
  btn.innerHTML="&#128190; 저장 후 목록에 추가";

  /* 미리보기 숨기고 카메라 초기화 */
  setTimeout(function(){resetCam();},800);
}

/* ── 목록 업데이트 ── */
function updateList(){
  var cnt=savedPhotos.length;
  document.getElementById("photoCount").textContent=cnt;
  document.getElementById("shareCnt").textContent=cnt;
  var shareBtn=document.getElementById("shareBtn");
  shareBtn.disabled=(cnt===0);

  var list=document.getElementById("savedList");
  if(cnt===0){
    list.innerHTML='<div class="empty-list" id="emptyMsg" style="grid-column:span 3;">촬영된 사진이 없습니다</div>';
    return;
  }
  var html="";
  savedPhotos.forEach(function(p,i){
    html+='<div class="saved-item">'
      +'<img src="'+p.dataUrl+'"/>'
      +'<button class="del-btn" onclick="removePhoto('+i+')">&#10005;</button>'
      +'<span class="num">'+(i+1)+'</span>'
      +'</div>';
  });
  list.innerHTML=html;
}

/* ── 사진 삭제 ── */
window.removePhoto=function(idx){
  savedPhotos.splice(idx,1);
  updateList();
};

/* ── 전체 삭제 ── */
window.clearAll=function(){
  if(savedPhotos.length===0)return;
  if(!confirm("저장된 사진 "+savedPhotos.length+"장을 모두 삭제할까요?"))return;
  savedPhotos=[];
  updateList();
};

/* ── 카카오톡 공유 (Web Share API) ── */
function sharePhotos(){
  if(savedPhotos.length===0){showTE("공유할 사진이 없습니다.");return;}

  var date  =document.getElementById("inDate").value;
  var loc   =document.getElementById("inLoc").value;
  var leader=document.getElementById("inLeader").value.trim()||"-";
  var tag   =document.getElementById("inTag").value.trim()||"-";
  var catEl =document.getElementById("inCat");
  var cat   =catEl.options[catEl.selectedIndex].text;
  var note  =document.getElementById("inNote").value.trim()||"-";
  var txt   ="[SHAHEEN] "+cat+"\nTAG: "+tag+"\nDATE: "+date+"\nAREA: "+loc+"\nLEADER: "+leader+"\nREMARK: "+note+"\n사진 "+savedPhotos.length+"장";

  /* ── 파일 공유 시도 ── */
  if(navigator.share){
    var files=savedPhotos.map(function(p){
      return new File([p.blob],p.filename,{type:"image/jpeg"});
    });

    var shareData={files:files,title:"[SHAHEEN] 현장 사진 "+savedPhotos.length+"장",text:txt};

    /* 파일 공유 가능 여부 */
    if(navigator.canShare&&navigator.canShare(shareData)){
      navigator.share(shareData)
        .then(function(){showT("전송 완료! ("+savedPhotos.length+"장)");})
        .catch(function(e){if(e.name!=="AbortError"){console.error(e);shareText(txt);}});
      return;
    }

    /* 파일 공유 불가 → 텍스트만 공유 */
    navigator.share({title:"[SHAHEEN] 현장 사진",text:txt})
      .then(function(){showT("텍스트 공유 완료!");})
      .catch(function(e){if(e.name!=="AbortError"){console.error(e);}});
    return;
  }

  /* ── Web Share API 미지원 → 직접 다운로드 ── */
  showTE("공유 미지원 브라우저입니다.\nChrome 또는 Safari로 접속해주세요.\n지금은 다운로드로 저장합니다.");
  savedPhotos.forEach(function(p){
    var a=document.createElement("a");
    a.href=p.dataUrl;a.download=p.filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  });
}

function shareText(txt){
  if(navigator.share){
    navigator.share({title:"[SHAHEEN] 현장 사진",text:txt})
      .catch(function(){});
  }
}

/* ── Reset Camera ── */
function resetCam(){
  loadedImg=null;
  document.getElementById("fileInput").value="";
  document.getElementById("camBox").innerHTML=
    '<div style="text-align:center;pointer-events:none;">'
    +'<div style="font-size:46px;margin-bottom:8px;">&#128247;</div>'
    +'<p style="font-size:13px;color:#64748B;">Tap to take next photo (4:3)</p>'
    +'<p style="font-size:11px;color:#F59E0B;margin-top:6px;font-weight:700;">저장된 사진: '+savedPhotos.length+'장</p>'
    +'</div>'
    +'<div class="corner tl"></div><div class="corner tr"></div>'
    +'<div class="corner bl"></div><div class="corner br"></div>';
  document.getElementById("prevCard").style.display="none";
  document.getElementById("inTime").value=new Date().toTimeString().slice(0,5);
  document.getElementById("camCard").scrollIntoView({behavior:"smooth"});
}

function showT(m){
  var t=document.getElementById("toast");
  t.textContent=m;t.style.display="block";
  setTimeout(function(){t.style.display="none";},3000);
}
function showTE(m){
  var t=document.getElementById("toastE");
  t.textContent=m;t.style.display="block";
  setTimeout(function(){t.style.display="none";},4000);
}
</script>
</body>
</html>
